<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal BAU</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon"><i class="bi bi-gear-wide-connected"></i></div>
            <h4>Portal BAU</h4>
        </div>
        <ul class="sidebar-nav">
            <li class="sidebar-section-title">Tools</li>
            <li class="nav-item">
                <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                    <i class="bi bi-phone"></i> Xử lý CSV Update Phone
                </a>
            </li>

            <li class="nav-item">
                <a href="/responses" class="nav-link {% if request.endpoint == 'responses_page' %}active{% endif %}">
                    <i class="bi bi-chat-left-text"></i> Mẫu phản hồi ITSD
                </a>
            </li>

            <li class="nav-item">
                <a href="/image-api" class="nav-link {% if request.endpoint == 'image_api_page' %}active{% endif %}">
                    <i class="bi bi-image"></i>  Giao diện FEOL2.0 - API
                </a>
            </li>

            <li class="sidebar-section-title">Dữ liệu</li>
            <li class="nav-item">
                <a href="/history" class="nav-link {% if request.endpoint == 'history_page' %}active{% endif %}">
                    <i class="bi bi-clock-history"></i> Lịch sử xử lý
                </a>
            </li>
            
            <li class="nav-item">
                <a href="/log" class="nav-link {% if request.endpoint == 'log_page' %}active{% endif %}">
                    <i class="bi bi-journal-text"></i> Nhật ký hệ thống
                </a>
            </li>
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- TOP HEADER -->
        <div class="top-header">
            <h5><i class="bi bi-{% block header_icon %}house{% endblock %} me-2"></i>{% block header_title %}Dashboard{% endblock %}</h5>
            <span class="badge bg-success badge-status">
                <i class="bi bi-circle-fill me-1" style="font-size:0.5rem"></i> Running on localhost:5000
            </span>
        </div>

        <!-- PAGE CONTENT -->
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
